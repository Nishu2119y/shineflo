<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Travel Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>✈️ AI Travel Planner</h1>
      <p>Plan your perfect trip with AI assistance</p>
    </header>

    <div class="form-section" id="formSection">
      <form id="travelForm">
        <div class="form-group">
          <label for="destination">Destination</label>
          <input type="text" id="destination" placeholder="e.g., Paris, Tokyo, New York" required>
        </div>

        <div class="form-group">
          <label for="days">Number of Days</label>
          <input type="number" id="days" min="1" max="30" placeholder="e.g., 5" required>
        </div>

        <div class="form-group">
          <label for="budget">Budget</label>
          <input type="text" id="budget" placeholder="e.g., $2000, ₹50000" required>
        </div>

        <div class="form-group">
          <label for="interests">Interests</label>
          <input type="text" id="interests" placeholder="e.g., adventure, food, culture, nature" required>
        </div>

        <button type="submit" class="btn-generate">Generate Trip</button>
      </form>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Generating your perfect itinerary...</p>
    </div>

    <div class="result-section" id="resultSection">
      <h2>Your Travel Itinerary</h2>
      <div id="tripPlan"></div>
      <button class="btn-new" onclick="resetForm()">Plan Another Trip</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
